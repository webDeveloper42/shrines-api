name: Bug Report
description: Report a bug in the Shrine Database API or frontend
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report bugs in the API or client frontend.
        For **incorrect shrine data**, use the "Shrine Data" template instead.
        For **security vulnerabilities**, see [SECURITY.md](../../SECURITY.md) — do not open a public issue.

  - type: dropdown
    id: area
    attributes:
      label: Where is the bug?
      options:
        - API — shrine endpoints (GET /api/shrines)
        - API — authentication / API key registration
        - API — payment / tier upgrade
        - Frontend — shrine browser
        - Frontend — developer portal
        - Frontend — pricing or docs page
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug. Include the full API response or error message if relevant.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Register a free API key at /developers
        2. Call GET /api/shrines/:id with the key
        3. Receive error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version (for API bugs)
      placeholder: e.g. 20.11.0
