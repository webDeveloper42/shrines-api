name: Bug Report
description: Report a bug in the API or frontend
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. For **security vulnerabilities**, please see [SECURITY.md](../../SECURITY.md) instead.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Frontend (shrine-finder)
        - Shrine data / database
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call GET /api/shrines with...
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
